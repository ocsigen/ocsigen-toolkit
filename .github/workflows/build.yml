name: Build

on:
  pull_request:
  push:
    branches:
      - master
  schedule:
    # Prime the caches every Monday
    - cron: 0 1 * * MON

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
        ocaml-compiler:
          - "5.3"
          - "5.4"
        include:
          - os: macos-latest
            ocaml-compiler: "5.4"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout tree
        uses: actions/checkout@v7

      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}
          opam-pin: false

      - name: Re-install OpenSSL on macOS
        if: runner.os == 'macOS'
        run: brew update && brew reinstall openssl@3

      - name: Set up Binaryen
        # ocsigen-toolkit depends on wasm_of_ocaml-compiler, whose build needs a
        # recent binaryen (wasm-merge); distro binaryen is too old. Same action as
        # js_of_ocaml's own CI.
        uses: Aandreba/setup-binaryen@v1.0.0
        with:
          token: ${{ github.token }}

      - run: opam pin add -n eliom https://github.com/ocsigen/eliom.git

      # Pin dune below 3.24. dune 3.24 changed dune-variable paths to a
      # leading-"./" form (ocaml/dune#15156), which makes the wasm_of_ocaml
      # runtime (pulled in via eliom) emit malformed "module:path" lines and
      # fail to build with "The runtime contains unknown imports". The fix
      # only landed in js_of_ocaml 6.4.1 (ocsigen/js_of_ocaml#2371), but we
      # cap js_of_ocaml below 6.4 (see the opam file), so the 6.3.x wasm
      # runtime -- which has the same bug -- still needs an older dune.
      - run: opam pin add -n dune 3.23.1

      - run: opam install . --deps-only

      - run: opam exec -- dune build @install
